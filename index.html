<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的 GitHub 仓库内容</title>
    <style>
        body { font-family: Arial, sans-serif; }
        pre { background: #f0f0f0; padding: 10px; }
    </style>
</head>
<body>
    <h1>我的 GitHub 仓库内容</h1>
    <div id="repo-content"></div>

    <script>
        const username = 'xiaoyaoyufeng0';  // 替换为你的 GitHub 用户名
        const repo = 'xiaoyaoyufeng0.github.io';      // 替换为你的仓库名

        fetch(`https://api.github.com/repos/${username}/${repo}/contents`)
            .then(response => response.json())
            .then(data => {
                const contentDiv = document.getElementById('repo-content');
                data.forEach(file => {
                    const fileInfo = document.createElement('pre');
                    fileInfo.textContent = file.name;
                    contentDiv.appendChild(fileInfo);
                });
            })
            .catch(error => console.error('Error fetching repository content:', error));
    </script>
</body>
</html>
